persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type warning
log_type notice

# ── Auth: no anonymous, credentials + ACL required ─────────────
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# ── Limits (defense against runaway/hostile publishers) ────────
# NOTE: In mosquitto 2.1+, `max_connections` before any `listener`
# directive causes the parser to auto-create a phantom default
# listener on 1883, colliding with the explicit `listener 1883` below
# and crashing with "Address in use". -1 (unlimited) is the default
# anyway, so we just omit it.
max_packet_size 4096
max_inflight_messages 40
max_queued_messages 1000

# ── Plaintext listener: docker-internal use only ───────────────
# Not published to the host in docker-compose. If you point ESP32s
# directly at this port over a trusted LAN, remove it and use TLS.
listener 1883 0.0.0.0

# ── TLS listener: for shipped ESP32s / anything off-box ────────
listener 8883 0.0.0.0
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key
tls_version tlsv1.2

# Uncomment to require client certificates (mutual TLS).
# require_certificate true
# use_identity_as_username true
